<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula Uma Fantasy League</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;

    background:
    linear-gradient(rgba(5,8,20,0.86),rgba(5,8,20,0.92)),
    url('https://wallpapercave.com/wp/wp15723729.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#4cc9f0;
    border-radius:20px;
}

.container{
    width:95%;
    max-width:1600px;
    margin:auto;
    padding:40px 0 80px;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;

    margin-bottom:40px;
}

.logo h1{
    font-family:'Orbitron',sans-serif;
    font-size:3.4rem;
    font-weight:800;
    letter-spacing:2px;
}

.logo span{
    color:#4cc9f0;
}

.logo p{
    margin-top:8px;
    opacity:0.7;
}

.button-group{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.top-btn{
    border:none;

    padding:15px 22px;

    border-radius:18px;

    background:
    linear-gradient(135deg,#4cc9f0,#4361ee,#7209b7);

    color:white;

    font-size:0.95rem;
    font-weight:700;
    letter-spacing:1px;

    cursor:pointer;

    transition:0.25s ease;

    box-shadow:0 10px 30px rgba(67,97,238,0.35);
}

.top-btn:hover{
    transform:translateY(-4px) scale(1.03);
}

/* MARKET */

.market-grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(290px,1fr));

    gap:22px;
}

.card{
    position:relative;

    overflow:hidden;

    border-radius:28px;

    padding:24px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.10),
        rgba(255,255,255,0.04)
    );

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-8px);

    border-color:rgba(76,201,240,0.5);

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35);
}

.card::before{
    content:'';

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:5px;

    background:
    linear-gradient(
        90deg,
        #4cc9f0,
        #4361ee,
        #7209b7
    );
}

.uma-name{
    font-size:1.5rem;
    font-weight:700;
}

.team{
    margin-top:6px;
    opacity:0.7;
    font-size:0.95rem;
}

.value-area{
    margin-top:26px;

    display:flex;
    justify-content:space-between;
    align-items:end;
}

.price{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    font-weight:700;
}

.change{
    padding:8px 14px;
    border-radius:999px;

    font-size:0.92rem;
    font-weight:700;
}

.up{
    background:rgba(42,245,152,0.14);
    color:#2af598;
}

.down{
    background:rgba(255,92,92,0.14);
    color:#ff6b6b;
}

/* POPUP */

.popup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.72);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    pointer-events:none;

    transition:0.25s;

    z-index:999;
}

.popup.active{
    opacity:1;
    pointer-events:auto;
}

.popup-box{
    width:92%;
    max-width:760px;

    border-radius:32px;

    padding:34px;

    background:
    linear-gradient(
        145deg,
        rgba(20,25,40,0.98),
        rgba(10,12,22,0.98)
    );

    border:1px solid rgba(255,255,255,0.08);

    animation:popupShow 0.25s ease;

    max-height:85vh;

    display:flex;
    flex-direction:column;
}

@keyframes popupShow{

    from{
        transform:translateY(20px) scale(0.96);
        opacity:0;
    }

    to{
        transform:translateY(0) scale(1);
        opacity:1;
    }
}

.popup-top{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:28px;
}

.popup-title{
    font-family:'Orbitron',sans-serif;
    font-size:2.1rem;
    font-weight:800;
}

.close{
    width:42px;
    height:42px;

    border:none;
    border-radius:50%;

    background:#ff4d6d;
    color:white;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

.close:hover{
    transform:scale(1.1);
}

.list{
    display:flex;
    flex-direction:column;
    gap:16px;

    overflow-y:auto;

    padding-right:8px;
}

.list::-webkit-scrollbar{
    width:8px;
}

.list::-webkit-scrollbar-thumb{
    background:#4cc9f0;
    border-radius:20px;
}

.player{
    padding:18px 20px;

    border-radius:20px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.06);

    display:flex;
    justify-content:space-between;
    align-items:center;

    transition:0.2s;
}

.player:hover{
    transform:translateX(5px);

    background:rgba(255,255,255,0.08);
}

.player-left{
    display:flex;
    align-items:center;
    gap:16px;
}

.rank{
    width:48px;
    height:48px;

    border-radius:14px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:800;

    background:
    linear-gradient(
        135deg,
        #4cc9f0,
        #4361ee
    );
}

.player-name{
    font-size:1.05rem;
    font-weight:700;
}

.player-team{
    margin-top:4px;
    opacity:0.65;
    font-size:0.85rem;
}

.points{
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    color:#4cc9f0;
}

.footer{
    margin-top:50px;

    text-align:center;

    opacity:0.5;
    font-size:0.9rem;
}

@media(max-width:700px){

    .logo h1{
        font-size:2.2rem;
    }

    .popup-title{
        font-size:1.5rem;
    }

    .price{
        font-size:1.6rem;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="topbar">

        <div class="logo">
            <h1>FORMULA <span>UMA</span></h1>
            <p>Fantasy League Driver Market • Season 2026</p>
        </div>

        <div class="button-group">

            <button class="top-btn" onclick="openPopup('playerPopup')">
                PLAYER RANKING
            </button>

            <button class="top-btn" onclick="openPopup('wdcPopup')">
                WDC
            </button>

            <button class="top-btn" onclick="openPopup('wccPopup')">
                WCC
            </button>

        </div>

    </div>

    <div class="market-grid" id="marketGrid"></div>

    <div class="footer">
        Formula Uma Fantasy League © 2026
    </div>

</div>

<!-- PLAYER POPUP -->

<div class="popup" id="playerPopup">

    <div class="popup-box">

        <div class="popup-top">

            <div class="popup-title">PLAYER RANKING</div>

            <button class="close" onclick="closePopup('playerPopup')">
                ✕
            </button>

        </div>

        <div class="list" id="playerList"></div>

    </div>

</div>

<!-- WDC POPUP -->

<div class="popup" id="wdcPopup">

    <div class="popup-box">

        <div class="popup-top">

            <div class="popup-title">WDC STANDINGS</div>

            <button class="close" onclick="closePopup('wdcPopup')">
                ✕
            </button>

        </div>

        <div class="list" id="wdcList"></div>

    </div>

</div>

<!-- WCC POPUP -->

<div class="popup" id="wccPopup">

    <div class="popup-box">

        <div class="popup-top">

            <div class="popup-title">WCC STANDINGS</div>

            <button class="close" onclick="closePopup('wccPopup')">
                ✕
            </button>

        </div>

        <div class="list" id="wccList"></div>

    </div>

</div>

<script>

/* =========================
   MARKET DATA
========================= */

const umas = [

    {name:'Kitasan Black',team:'Williams',value:'23.1M$',change:'+0.1M$',up:true},

const players = [

    {name:'Riku#9181',team:'Rice (C) - Teio - Rudolf - Acute - Eye',points:181},

    {name:'Aoi#0001',team:'Spe (C) - Teio - Oguri - Mcqueen - Doto',points:135},

    {name:'Yuzakisento#5409',team:'Spe (C) - Suzuka - Tamamo - Machan - Taiki',points:105},
    {name:'Kamenridertria3#9583',team:'Kita (C) - Gold - Oguri - Mcqueen - Falcon',points:77},
    {name:'Luuduy2k3#0442',team:'Dia (C) - Kita - Falcon - Mcqueen - Bourbon',points:57},
    {name:'Akasaka#0002',team:'Kita (C) - Teio - Rudolf - Mcqueen - Doto',points:53},
    {name:'22nd_2006#8158',team:'Kita (C) - Dia - Turbo - Acute - Eye',points:36}

];

/* =========================
   WDC DATA
========================= */

const wdc = [

    {name:'Silence Suzuka',team:'Red Bull Racing',points:182},
    {name:'Kitasan Black',team:'Ferrari',points:170},
    {name:'Tokai Teio',team:'Mercedes AMG',points:166},
    {name:'Special Week',team:'Aston Martin',points:140},
    {name:'Narita Brian',team:'McLaren',points:131},
    {name:'Rice Shower',team:'Ferrari',points:118},
    {name:'Symboli Rudolf',team:'Mercedes AMG',points:102}

];

/* =========================
   WCC DATA
========================= */

const wcc = [

    {name:'Ferrari',points:288},
    {name:'Mercedes AMG',points:268},
    {name:'Red Bull Racing',points:251},

    {name:'Aston Martin',points:187},

    {name:'Alpine',points:95}

/* =========================
   MARKET RENDER
========================= */

const marketGrid = document.getElementById('marketGrid');

umas.forEach(uma=>{

    marketGrid.innerHTML += `

    <div class="card">

        <div class="uma-name">${uma.name}</div>

        <div class="team">${uma.team}</div>

        <div class="value-area">

            <div class="price">${uma.value}</div>

            <div class="change ${uma.up ? 'up':'down'}">
                ${uma.change}
            </div>

        </div>

    </div>

    `;

});

/* =========================
   PLAYER RANKING
========================= */

function renderPlayers(){

    players.sort((a,b)=>b.points-a.points);

    const list = document.getElementById('playerList');

    list.innerHTML = '';

    players.forEach((player,index)=>{

        list.innerHTML += `

        <div class="player">

            <div class="player-left">

                <div class="rank">${index+1}</div>

                <div>

                    <div class="player-name">
                        ${player.name}
                    </div>

                    <div class="player-team">
                        ${player.team}
                    </div>

                </div>

            </div>

            <div class="points">
                ${player.points} PTS
            </div>

        </div>

        `;

    });
}

/* =========================
   WDC
========================= */

function renderWDC(){

    wdc.sort((a,b)=>b.points-a.points);

    const list = document.getElementById('wdcList');

    list.innerHTML = '';

    wdc.forEach((driver,index)=>{

        list.innerHTML += `

        <div class="player">

            <div class="player-left">

                <div class="rank">${index+1}</div>

                <div>

                    <div class="player-name">
                        ${driver.name}
                    </div>

                    <div class="player-team">
                        ${driver.team}
                    </div>

                </div>

            </div>

            <div class="points">
                ${driver.points} PTS
            </div>

        </div>

        `;

    });
}

/* =========================
   WCC
========================= */

function renderWCC(){

    wcc.sort((a,b)=>b.points-a.points);

    const list = document.getElementById('wccList');

    list.innerHTML = '';

    wcc.forEach((team,index)=>{

        list.innerHTML += `

        <div class="player">

            <div class="player-left">

                <div class="rank">${index+1}</div>

                <div>

                    <div class="player-name">
                        ${team.name}
                    </div>

                    <div class="player-team">
                        Constructor Team
                    </div>

                </div>

            </div>

            <div class="points">
                ${team.points} PTS
            </div>

        </div>

        `;

    });
}

renderPlayers();
renderWDC();
renderWCC();

/* =========================
   POPUP
========================= */

function openPopup(id){

    document
    .getElementById(id)
    .classList.add('active');
}

function closePopup(id){

    document
    .getElementById(id)
    .classList.remove('active');
}

window.addEventListener('click',(e)=>{

    document.querySelectorAll('.popup').forEach(popup=>{

        if(e.target === popup){
            popup.classList.remove('active');
        }

    });

});

========================= */

*/

</script>

</body>
</html>
